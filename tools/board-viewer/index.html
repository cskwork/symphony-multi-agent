<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Symphony Board Viewer</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
  />
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body>
  <header class="app-header" role="banner">
    <div class="header-left">
      <h1 class="app-title">Symphony Board Viewer</h1>
      <span id="repo-name" class="repo-name"></span>
      <div id="branch-controls" class="branch-controls" hidden>
        <label class="branch-select-label">
          base
          <select id="feature-base-branch" class="branch-select" aria-label="Feature branch base"></select>
        </label>
        <label class="branch-select-label">
          merge
          <select id="merge-target-branch" class="branch-select" aria-label="Merge target branch"></select>
        </label>
      </div>
    </div>
    <div class="header-right">
      <div class="status-block">
        <span class="status-dot" id="status-dot" data-state="unknown" aria-hidden="true"></span>
        <span id="status-text" class="status-text">상태 확인 중…</span>
      </div>
      <div class="meta-block">
        <span id="last-poll" class="last-poll">last poll: —</span>
        <span id="ticket-count" class="ticket-count">tickets: —</span>
      </div>
      <input
        id="search-input"
        class="search-input"
        type="search"
        placeholder="티켓 ID 검색 ( / )"
        aria-label="티켓 검색"
        autocomplete="off"
      />
      <button id="refresh-btn" class="refresh-btn" type="button" title="즉시 새로고침 (r)">
        새로고침
      </button>
      <button id="settings-btn" class="settings-btn" type="button" title="설정 (config.yaml + .env)">
        설정
      </button>
      <div class="zoom-controls" role="group" aria-label="UI 크기 조절">
        <button id="zoom-out" class="zoom-btn" type="button" aria-label="UI 줄이기" title="줄이기 ( [ )">−</button>
        <span id="zoom-value" class="zoom-value" aria-live="polite">100%</span>
        <button id="zoom-in" class="zoom-btn" type="button" aria-label="UI 키우기" title="키우기 ( ] )">+</button>
        <button id="zoom-reset" class="zoom-btn zoom-reset" type="button" aria-label="UI 크기 리셋" title="리셋 ( \\ )">⟲</button>
      </div>
      <div class="theme-controls" id="theme-controls" role="group" aria-label="테마">
        <button type="button" class="theme-btn" data-theme="default" aria-pressed="true" title="Default 테마 (graphite)">Default</button>
        <button type="button" class="theme-btn" data-theme="focus" aria-pressed="false" title="Focus 테마 (밝은)">Focus</button>
        <button type="button" class="theme-btn" data-theme="command" aria-pressed="false" title="Command 테마 (집중 다크)">Command</button>
      </div>
    </div>
  </header>

  <main class="board" id="board" aria-label="칸반 보드"></main>

  <footer class="app-footer">
    <span>archive · pause · resume · refresh · 5s polling · keys: <kbd>r</kbd> refresh / <kbd>/</kbd> 검색 / <kbd>j</kbd> <kbd>k</kbd> 이동 / <kbd>Enter</kbd> 열기 / <kbd>Esc</kbd> 닫기 / <kbd>[</kbd> <kbd>]</kbd> 크기 / <kbd>\</kbd> 리셋</span>
  </footer>

  <!-- 카드 상세 modal -->
  <div id="modal-backdrop" class="modal-backdrop" hidden>
    <div
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      id="modal"
    >
      <header class="modal-header">
        <h2 id="modal-title" class="modal-title">—</h2>
        <div class="modal-actions">
          <a id="modal-raw-link" class="modal-link" href="#" target="_blank" rel="noopener">원본 보기</a>
          <button id="modal-close" class="modal-close" type="button" aria-label="닫기">×</button>
        </div>
      </header>
      <div class="modal-body">
        <section class="modal-meta">
          <table id="modal-meta-table" class="meta-table"></table>
        </section>
        <article id="modal-content" class="modal-content"></article>
      </div>
    </div>
  </div>

  <!-- 설정 modal — config.yaml + .env -->
  <div id="settings-backdrop" class="modal-backdrop settings-backdrop" hidden>
    <div
      class="modal settings-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="settings-title"
      id="settings-modal"
    >
      <header class="modal-header">
        <h2 id="settings-title" class="modal-title">설정</h2>
        <div class="modal-actions">
          <span id="settings-paths" class="settings-paths"></span>
          <button id="settings-close" class="modal-close" type="button" aria-label="닫기">×</button>
        </div>
      </header>
      <div class="modal-body settings-body">
        <div id="settings-status" class="settings-status" role="status" aria-live="polite"></div>

        <section class="settings-section" aria-labelledby="settings-dograh-title">
          <h3 id="settings-dograh-title" class="settings-section-title">Dograh</h3>
          <div class="settings-grid" id="settings-dograh-fields"></div>
        </section>

        <section class="settings-section" aria-labelledby="settings-db-title">
          <div class="settings-section-head">
            <h3 id="settings-db-title" class="settings-section-title">Databases</h3>
            <button id="settings-add-db" class="settings-add-btn" type="button">+ 추가</button>
          </div>
          <div id="settings-db-list" class="settings-db-list"></div>
        </section>

        <section class="settings-section" aria-labelledby="settings-preview-title">
          <h3 id="settings-preview-title" class="settings-section-title">.env preview (저장 시 반영)</h3>
          <pre id="settings-env-preview" class="settings-env-preview">—</pre>
        </section>
      </div>
      <footer class="settings-footer">
        <button id="settings-cancel" class="settings-cancel-btn" type="button">취소</button>
        <button id="settings-save" class="settings-save-btn" type="button">저장</button>
      </footer>
    </div>
  </div>

  <!-- marked.js for markdown rendering + DOMPurify for XSS sanitization -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
  <script type="module" src="/src/js/utils.js"></script>
  <script type="module" src="/src/js/api.js"></script>
  <script type="module" src="/src/js/ticket.js"></script>
  <script type="module" src="/src/js/board.js"></script>
  <script type="module" src="/src/js/settings.js"></script>
</body>
</html>
